services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "${GATEWAY_PORT:-8642}:8642"
    volumes:
      - hermes-data:/opt/data
    networks:
      - hermes-net
    env_file:
      - path: ./.env
        required: false  
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0
    ports:
      - "${DASHBOARD_PORT:-9119}:9119"
    volumes:
      - hermes-data:/opt/data
    environment:
      - GATEWAY_HEALTH_URL=http://hermes:${GATEWAY_PORT:-8642}
    networks:
      - hermes-net
    depends_on:
      - hermes
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
volumes:
  hermes-data:
    driver: local
    driver_opts:
      type: 'none'
      device: ${DATA_HOME:-~/.hermes}
      o: 'bind'
networks:
  hermes-net:
    driver: bridge